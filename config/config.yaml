inputs:
  portuguese: "data/raw/constituicao-pt.pdf"
  nheengatu: "data/raw/constituicao-nhe.pdf"

output:
  dir: "output"
  formats: ["json", "tsv", "csv", "moses"]
  pretty_json: true

portuguese:
  body_start_pattern: "PREÂMBULO\\s*\\n\\s*Nós,"
  body_end_pattern: "ATO DAS DISPOSIÇÕES\\s*\\n\\s*CONSTITUCIONAIS TRANSITÓRIAS"
  preamble_heading: "PREÂMBULO"
  preamble_end_pattern: "\\nTÍTULO"
  adct_start_pattern: "ATO DAS DISPOSIÇÕES\\s*\\n\\s*CONSTITUCIONAIS TRANSITÓRIAS"
  adct_end_pattern: "Brasília,\\s+5\\s+de\\s+outubro\\s+de\\s+1988"

nheengatu:
  running_header_pattern: "\\f?\"Mundu sa Turusu\" waá[^\\n]*\\n"
  strip_bell: true
  preamble_heading: "YUPIRUNGÁ RẼDEWÁ"
  body_start_occurrence: 1
  preamble_end_pattern: "\\nSESEWÁRA"
  adct_start_pattern: "ŨBEU\\s+SÁ\\s+TA\\s+MŨDUSÁWA\\s+TURUSÚ\\s+WAÁ\\s+KUXIIMA"
  adct_start_occurrence: 2
  adct_end_pattern: "SOBRE OS TRADUTORES"

articles:
  pattern: "(?:^|\\n)(Art\\.\\s*(\\d+(?:-[A-Z])?)\\s*[oº°.]?\\s)"
  nhe_header_fixups:
    - ["Art 102.", "Art. 102."]
    - ["Art.. 158.", "Art. 158."]
    - ["Art. 141.Upawá", "Art. 141. Upawá"]
  known_missing_in_nhe: []

units:
  max_unit_count_delta: 999
  split_markers:
    - pattern: "\\n[ \\t]+(Parágrafo único[.:]?\\s)"
      label: "paragrafo_unico"
    - pattern: "\\n[ \\t]+(Ũbeusá [Yy]ep[eé][yỹ][uũ][^\\n]{0,20}?[.,:;]\\s)"
      label: "paragrafo_unico"
    - pattern: "\\n[ \\t]+(§\\s*[1-9][oº°]\\s)"
      label: "paragrafo"
    - pattern: "\\n[ \\t]+(§\\s*[1-9]\\d[.]\\s)"
      label: "paragrafo"
    - pattern: "\\n[ \\t]+(§\\s*[1-9][.]\\s)"
      label: "paragrafo"

normalisation:
  fix_soft_hyphens: true
  collapse_whitespace: true
  strip_page_numbers: true
  page_number_pattern: "^\\s*\\d{1,3}\\s*$"
